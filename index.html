<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me, Pragya My Bare Minimum? ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffb6c1,#ffd1dc);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:white;
font-size:3rem;
text-align:center;
padding:20px;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

button{
border:none;
padding:15px 35px;
font-size:22px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:#28a745;
color:white;
margin-right:10px;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
}

.heart{
position:absolute;
bottom:-50px;
font-size:30px;
animation:floatUp linear infinite;
pointer-events:none;
}

@keyframes floatUp{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<h1 id="question">Do you love me? ❤️</h1>

<div>
<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 💔</button>
</div>

<audio id="bgMusic" loop>
<source src="./song.mp3" type="audio/mpeg">
</audio>

<script>

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const question=document.getElementById("question");
const bgMusic=document.getElementById("bgMusic");

const messages=[
"Are you sure? 🥺",
"Really sure? 😭",
"Think again ❤️",
"Please? 🥹",
"Don't break my heart 💔",
"Pretty please? 🌹",
"Last chance 😭",
"Why are you doing this? 😂",
"You cannot escape ❤️"
];

let count=0;
let yesSize=22;

document.addEventListener("click",function(){

bgMusic.play()
.then(()=>console.log("music playing"))
.catch(err=>console.log(err));

},{once:true});

function moveButton(){

const maxX=window.innerWidth-150;
const maxY=window.innerHeight-100;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

moveButton();

noBtn.addEventListener("mouseover",moveButton);

noBtn.addEventListener("click",function(){

if(count<messages.length){
question.innerHTML=messages[count];
}

yesSize+=10;
yesBtn.style.fontSize=yesSize+"px";

count++;
moveButton();

});

yesBtn.addEventListener("click",function(){

document.body.innerHTML=`
<div style="text-align:center;">
<h1 style="font-size:70px;">🎉❤️ YAYYYY ❤️🎉</h1>
<h2 style="color:white;font-size:35px;">
I knew you'd say YES 🥰
</h2>
<h2 style="color:white;margin-top:20px;">
❤️ Forever Starts Today ❤️
</h2>
</div>
`;

for(let i=0;i<150;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);
}
});

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
