<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me? ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffb6c1,#ffd1dc);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:white;
font-size:3rem;
text-align:center;
text-shadow:2px 2px 10px rgba(0,0,0,0.2);
margin-bottom:30px;
}

button{
border:none;
padding:15px 30px;
font-size:22px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
}

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear infinite;
pointer-events:none;
}

@keyframes floatUp{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<h1 id="question">Do you love me? ❤️</h1>

<div>
<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 💔</button>
</div>

<audio id="bgMusic" preload="auto" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const question=document.getElementById("question");
const bgMusic=document.getElementById("bgMusic");

let musicStarted=false;

async function startMusic(){
if(musicStarted) return;

try{
bgMusic.volume=1;
await bgMusic.play();
musicStarted=true;
console.log("Music started");
}
catch(err){
console.log("Audio blocked:",err);
}
}

document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);

const messages=[
"Are you sure? 🥺",
"Really sure? 😭",
"Think again ❤️",
"Please? 🥹",
"Don't break my heart 💔",
"Pretty please? 🌹",
"Last chance 😭",
"You can't escape 😏"
];

let count=0;
let yesSize=22;

function moveNoButton(){

const maxX=window.innerWidth-150;
const maxY=window.innerHeight-100;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

moveNoButton();

noBtn.addEventListener("mouseover",moveNoButton);

noBtn.addEventListener("click",()=>{

if(count<messages.length){
question.innerHTML=messages[count];
}

yesSize+=10;
yesBtn.style.fontSize=yesSize+"px";

count++;

moveNoButton();

});

yesBtn.addEventListener("click",async()=>{

await startMusic();

document.body.innerHTML=`
<div style="text-align:center;">
<h1 style="font-size:70px;">
🎉❤️ YAYYYY ❤️🎉
</h1>

<h2 style="color:white;font-size:35px;">
I knew you'd say YES 🥰
</h2>

<h2 style="color:white;margin-top:20px;">
❤️ Forever Starts Today ❤️
</h2>
</div>
`;

for(let i=0;i<150;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);
}
});

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";
heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
